spring:
  profiles:
    active: test
  application:
    name: one-api-java-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=MATCH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cache:
    type: simple

logging:
  level:
    root: WARN
    com.oneapi: INFO
    org.hibernate: WARN
