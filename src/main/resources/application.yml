spring:
  application:
    name: one-api-java

  # 数据源：实际配置由 AppConfigConfiguration 根据 ~/.one-api/config.yaml 提供。
  # 这里只留默认值，运行时会覆盖。
  datasource:
    url: jdbc:postgresql://localhost:5432/oneapi
    username: oneapi
    password: ""
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      keepalive-time: 30000
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: false

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=5m

oneapi:
  server:
    port: 13000
  relay:
    max-retries: 2
    cache-ttl-seconds: 10
    layer-order: free, subscription, payg
    require-virtual-model: true
  policies:
    reasoning:
      trigger-suffix: "-max"

logging:
  level:
    root: INFO
    com.oneapi: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
