spring:
  application:
    name: one-api-java

  # 数据源：密码通过 SPRING_DATASOURCE_PASSWORD 环境变量传入，不提交到 Git
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:oneapi}
    username: ${DB_USER:oneapi}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      keepalive-time: 30000
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=5m

oneapi:
  server:
    port: 13000
  relay:
    max-retries: 2
    cache-ttl-seconds: 10
    layer-order: free, subscription, payg
    require-virtual-model: true
  policies:
    reasoning:
      trigger-suffix: "-max"

logging:
  level:
    root: INFO
    com.oneapi: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
