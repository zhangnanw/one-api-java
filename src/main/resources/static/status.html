<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>one-api-java 状态面板</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --orange: #db6d28;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
  }
  .header h1 span { color: var(--accent); }
  .header .meta {
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
  }
  .header .meta .live {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 4px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-header {
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-header .count {
    background: var(--border);
    color: var(--text);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left;
    padding: 8px 16px;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }
  td {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(88,166,255,0.04); }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .badge-active { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-inactive { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-disabled { background: rgba(139,148,158,0.15); color: var(--text-dim); }
  .badge-deprecated { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .caps {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .cap {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(88,166,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(88,166,255,0.2);
  }
  .empty {
    padding: 32px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }
  .error {
    padding: 16px;
    text-align: center;
    color: var(--red);
    font-size: 13px;
  }
  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }
  .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) {
    .columns { grid-template-columns: 1fr; }
  }
  .truncate {
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  #uptime { color: var(--green); }
</style>
</head>
<body>

<div class="header">
  <h1><span>one-api</span>-java 状态面板</h1>
  <div class="meta">
    <div><span class="live"></span>自动刷新 10s</div>
    <div id="lastUpdate">--</div>
  </div>
</div>

<div class="stats" id="stats">
  <div class="stat-card">
    <div class="value" id="s-vendors">-</div>
    <div class="label">供应商</div>
  </div>
  <div class="stat-card">
    <div class="value" id="s-instances">-</div>
    <div class="label">模型实例</div>
  </div>
  <div class="stat-card">
    <div class="value" id="s-vmodels">-</div>
    <div class="label">虚拟模型</div>
  </div>
  <div class="stat-card">
    <div class="value" id="s-catalog">-</div>
    <div class="label">模型画像</div>
  </div>
  <div class="stat-card">
    <div class="value" id="uptime">-</div>
    <div class="label">运行时间</div>
  </div>
</div>

<div class="columns">
  <div>
    <div class="section">
      <div class="section-header">
        供应商 (Vendors)
        <span class="count" id="vendor-count">0</span>
      </div>
      <div id="vendors-body"><div class="empty">加载中...</div></div>
    </div>

    <div class="section">
      <div class="section-header">
        虚拟模型 (Virtual Models)
        <span class="count" id="vm-count">0</span>
      </div>
      <div id="vmodels-body"><div class="empty">加载中...</div></div>
    </div>
  </div>

  <div>
    <div class="section">
      <div class="section-header">
        模型实例 (Instances)
        <span class="count" id="inst-count">0</span>
      </div>
      <div id="instances-body"><div class="empty">加载中...</div></div>
    </div>

    <div class="section">
      <div class="section-header">
        模型画像 (Model Catalog)
        <span class="count" id="catalog-count">0</span>
      </div>
      <div id="catalog-body"><div class="empty">加载中...</div></div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let startTime = 0;

async function fetchJSON(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(r.status);
  const j = await r.json();
  return j.data || j;
}

function fmtUptime(sec) {
  const d = Math.floor(sec / 86400);
  const h = Math.floor((sec % 86400) / 3600);
  const m = Math.floor((sec % 3600) / 60);
  if (d > 0) return d + 'd ' + h + 'h';
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
}

function statusBadge(s) {
  const map = {
    0: ['未知', 'badge-disabled'],
    1: ['活跃', 'badge-active'],
    2: ['已标记', 'badge-active'],
    3: ['已禁用', 'badge-disabled'],
    4: ['已废弃', 'badge-deprecated'],
    5: ['失败', 'badge-inactive'],
  };
  const [text, cls] = map[s] || ['?' + s, 'badge-disabled'];
  return `<span class="badge ${cls}">${text}</span>`;
}

function renderVendors(list) {
  document.getElementById('s-vendors').textContent = list.length;
  document.getElementById('vendor-count').textContent = list.length;
  if (!list.length) { document.getElementById('vendors-body').innerHTML = '<div class="empty">无数据</div>'; return; }
  let html = '<table><tr><th>ID</th><th>名称</th><th>状态</th><th>Base URL</th></tr>';
  for (const v of list) {
    const url = v.base_url || '-';
    html += `<tr><td>${v.id}</td><td>${esc(v.name)}</td><td>${statusBadge(v.status)}</td>
      <td><div class="truncate" title="${esc(url)}">${esc(url)}</div></td></tr>`;
  }
  html += '</table>';
  document.getElementById('vendors-body').innerHTML = html;
}

function renderInstances(list) {
  document.getElementById('s-instances').textContent = list.length;
  document.getElementById('inst-count').textContent = list.length;
  if (!list.length) { document.getElementById('instances-body').innerHTML = '<div class="empty">无数据</div>'; return; }
  let html = '<table><tr><th>ID</th><th>模型</th><th>上游模型</th><th>状态</th><th>供应商</th></tr>';
  for (const i of list) {
    const up = i.upstream_model || i.model_name || '-';
    const vendor = i.vendor ? esc(i.vendor.name) : 'ID:' + i.vendor_id;
    html += `<tr><td>${i.id}</td><td><code>${esc(i.model_name)}</code></td>
      <td><div class="truncate">${esc(up)}</div></td>
      <td>${statusBadge(i.status)}</td><td>${vendor}</td></tr>`;
  }
  html += '</table>';
  document.getElementById('instances-body').innerHTML = html;
}

function renderVModels(list) {
  document.getElementById('s-vmodels').textContent = list.length;
  document.getElementById('vm-count').textContent = list.length;
  if (!list.length) { document.getElementById('vmodels-body').innerHTML = '<div class="empty">无数据</div>'; return; }
  let html = '<table><tr><th>ID</th><th>名称</th><th>匹配规则</th></tr>';
  for (const v of list) {
    const m = v.match || '-';
    html += `<tr><td>${v.id}</td><td><code>${esc(v.name)}</code></td>
      <td><div class="truncate" title="${esc(m)}">${esc(m)}</div></td></tr>`;
  }
  html += '</table>';
  document.getElementById('vmodels-body').innerHTML = html;
}

function renderCatalog(list) {
  document.getElementById('s-catalog').textContent = list.length;
  document.getElementById('catalog-count').textContent = list.length;
  if (!list.length) { document.getElementById('catalog-body').innerHTML = '<div class="empty">无数据</div>'; return; }
  let html = '<table><tr><th>模型</th><th>能力</th><th>上下文</th></tr>';
  for (const c of list) {
    let caps = '';
    try {
      const arr = JSON.parse(c.capabilities || '[]');
      caps = '<div class="caps">' + arr.map(x => `<span class="cap">${esc(x)}</span>`).join('') + '</div>';
    } catch { caps = c.capabilities || '-'; }
    const ctx = c.context_window ? (c.context_window >= 1000000 ? (c.context_window/1000000)+'M' : (c.context_window/1024)+'K') : '-';
    html += `<tr><td><code>${esc(c.name)}</code></td><td>${caps}</td><td>${ctx}</td></tr>`;
  }
  html += '</table>';
  document.getElementById('catalog-body').innerHTML = html;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function refresh() {
  try {
    const [status, vendors, instances, vmodels, catalog] = await Promise.all([
      fetchJSON('/api/status'),
      fetchJSON('/api/vendors'),
      fetchJSON('/api/instances'),
      fetchJSON('/api/virtual-models'),
      fetchJSON('/api/model-catalog'),
    ]);
    startTime = status.start_time;
    document.getElementById('uptime').textContent = fmtUptime(Math.floor(Date.now()/1000) - startTime);
    renderVendors(vendors);
    renderInstances(instances);
    renderVModels(vmodels);
    renderCatalog(catalog);
    document.getElementById('lastUpdate').textContent = '更新于 ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error('refresh error:', e);
    document.getElementById('lastUpdate').textContent = '请求失败 ' + new Date().toLocaleTimeString();
  }
}

setInterval(() => {
  if (startTime) {
    document.getElementById('uptime').textContent = fmtUptime(Math.floor(Date.now()/1000) - startTime);
  }
}, 1000);

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
